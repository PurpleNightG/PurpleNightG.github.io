; ZLMediaKit 精简配置（install.sh 会替换 __PUBLIC_IP__）
[api]
apiDebug=1
secret=035c73f7-bb6b-4889-a715-d9eb2d1925cc

[general]
enableVhost=0

[http]
port=8080
allow_cross_domains=1
allow_ip_range=0.0.0.0/0

[rtc]
externIP=__PUBLIC_IP__
port=8000
tcpPort=8000
timeoutSec=30
; 内置 ICE 改到其他端口，3478 留给 Coturn
icePort=34780
iceTcpPort=34780
preferredCodecA=opus
preferredCodecV=H264

[rtp]
videoMtuSize=1400

[rtmp]
port=1935

[rtsp]
port=554

[srt]
port=9000

[rtp_proxy]
port=10000

[shell]
port=0

[onvif]
port=0
